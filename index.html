<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能家居控制系统 - ESP32 (稳定版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .status-bar {
            background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .connection-status { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .status-badge { display: flex; align-items: center; gap: 10px; }
        .led-green { width: 12px; height: 12px; background-color: #4CAF50; border-radius: 50%; animation: pulse 1.5s infinite; }
        .led-red { width: 12px; height: 12px; background-color: #f44336; border-radius: 50%; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .sensor-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: transform 0.3s; }
        .sensor-card:hover { transform: translateY(-5px); }
        .sensor-title { font-size: 1.2rem; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .sensor-value { font-size: 2.5rem; font-weight: bold; color: #667eea; }
        .sensor-unit { font-size: 1rem; color: #999; }
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .control-card { background: white; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .control-title { font-size: 1.2rem; color: #333; margin-bottom: 20px; }
        .btn { padding: 15px 40px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
        .btn-on { background: #4CAF50; color: white; box-shadow: 0 4px 15px rgba(76,175,80,0.3); }
        .btn-on:hover { background: #45a049; transform: scale(1.05); }
        .btn-off { background: #f44336; color: white; box-shadow: 0 4px 15px rgba(244,67,54,0.3); }
        .btn-off:hover { background: #da190b; transform: scale(1.05); }
        .log-section { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .log-title { font-size: 1.2rem; color: #333; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .log-content { background: #f5f5f5; border-radius: 10px; padding: 15px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.9rem; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid #ddd; color: #555; }
        .clear-btn { padding: 5px 15px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .refresh-info { text-align: center; color: white; margin-top: 20px; font-size: 0.8rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 智能家居控制系统</h1>
        
        <div class="status-bar">
            <div class="connection-status">
                <div class="status-badge">
                    <div id="statusLed" class="led-green"></div>
                    <span id="statusText" style="color: #333;">数据获取中...</span>
                </div>
                <div class="status-badge">📱 设备: ESP32</div>
                <div class="status-badge">🕐 最后更新: <span id="updateTime">--</span></div>
            </div>
        </div>

        <div class="sensor-grid">
            <div class="sensor-card">
                <div class="sensor-title">🌡️ 温度传感器</div>
                <div class="sensor-value"><span id="temperature">--</span><span class="sensor-unit">°C</span></div>
            </div>
            <div class="sensor-card">
                <div class="sensor-title">💧 湿度传感器</div>
                <div class="sensor-value"><span id="humidity">--</span><span class="sensor-unit">%</span></div>
            </div>
            <div class="sensor-card">
                <div class="sensor-title">🚶 人体红外</div>
                <div class="sensor-value"><span id="pir">--</span></div>
            </div>
        </div>

        <div class="control-grid">
            <div class="control-card">
                <div class="control-title">💡 LED灯控制</div>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="btn btn-on" onclick="controlDevice('light002', 'on')">🔛 开灯</button>
                    <button class="btn btn-off" onclick="controlDevice('light002', 'off')">🔛 关灯</button>
                </div>
                <div style="margin-top: 15px; font-size: 0.9rem; color: #666;">当前状态: <span id="ledStatus">--</span></div>
            </div>

            <div class="control-card">
                <div class="control-title">⚡ 继电器控制</div>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="btn btn-on" onclick="controlDevice('switch002', 'on')">🔌 开启</button>
                    <button class="btn btn-off" onclick="controlDevice('switch002', 'off')">🔌 关闭</button>
                </div>
                <div style="margin-top: 15px; font-size: 0.9rem; color: #666;">当前状态: <span id="relayStatus">--</span></div>
            </div>

            <div class="control-card">
                <div class="control-title">🔔 蜂鸣器控制</div>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="btn btn-on" onclick="controlDevice('alarm002', 'on')">🔊 鸣响</button>
                    <button class="btn btn-off" onclick="controlDevice('alarm002', 'off')">🔇 停止</button>
                </div>
                <div style="margin-top: 15px; font-size: 0.9rem; color: #666;">当前状态: <span id="alarmStatus">--</span></div>
            </div>
        </div>

        <div class="log-section">
            <div class="log-title">
                📋 设备日志
                <button class="clear-btn" onclick="clearLog()">清空日志</button>
            </div>
            <div class="log-content" id="logContent">
                <div class="log-entry">系统启动，等待数据...</div>
            </div>
        </div>
        <div class="refresh-info">
            🔄 数据每2秒自动刷新 | 基于巴法云 + 代理服务
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const BEMFA_UID = "2426cc5615e7463ba3d4ec3640ef2c49";
        // 使用代理服务器，彻底解决跨域问题
        const PROXY_URL = "https://cors-anywhere-lovat.vercel.app/";
        const API_BASE = "http://api.bemfa.com/api/device/v1/data/1/";
        
        const TOPICS = {
            temp: "temp002",
            humi: "humi002", 
            pir: "pir002",
            light: "light002",
            relay: "switch002",
            alarm: "alarm002"
        };

        let currentState = {
            light: false,
            relay: false,
            alarm: false,
            temperature: null,
            humidity: null,
            pir: 0
        };

        function addLog(message) {
            const logDiv = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `[${time}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
            while(logDiv.children.length > 50) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }

        function clearLog() {
            const logDiv = document.getElementById('logContent');
            logDiv.innerHTML = '<div class="log-entry">日志已清空</div>';
            addLog('日志已清空');
        }

        function updateUI() {
            document.getElementById('temperature').textContent = currentState.temperature !== null ? currentState.temperature.toFixed(1) : '--';
            document.getElementById('humidity').textContent = currentState.humidity !== null ? currentState.humidity.toFixed(1) : '--';
            document.getElementById('pir').textContent = currentState.pir === 1 ? '检测到有人 👤' : '无人 🚫';
            document.getElementById('ledStatus').textContent = currentState.light ? '已开启 💡' : '已关闭 ⚫';
            document.getElementById('relayStatus').textContent = currentState.relay ? '已开启 🔌' : '已关闭 ⚪';
            document.getElementById('alarmStatus').textContent = currentState.alarm ? '鸣响中 🔊' : '静音 🔇';
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
        }

        // 通过代理获取数据
        async function fetchData(topic) {
            try {
                const url = `${PROXY_URL}${API_BASE}${BEMFA_UID}/${topic}`;
                const response = await fetch(url);
                const data = await response.text();
                return data.trim();
            } catch (error) {
                console.error(`获取${topic}失败:`, error);
                return null;
            }
        }

        // 获取所有数据
        async function fetchAllData() {
            try {
                const temp = await fetchData(TOPICS.temp);
                if (temp !== null && !isNaN(parseFloat(temp))) {
                    currentState.temperature = parseFloat(temp);
                }
                
                const humi = await fetchData(TOPICS.humi);
                if (humi !== null && !isNaN(parseFloat(humi))) {
                    currentState.humidity = parseFloat(humi);
                }
                
                const pir = await fetchData(TOPICS.pir);
                if (pir !== null) {
                    currentState.pir = parseInt(pir) || 0;
                    if (currentState.pir === 1) {
                        addLog(`👤 检测到人体移动`);
                    }
                }
                
                const light = await fetchData(TOPICS.light);
                if (light !== null) {
                    currentState.light = (light === 'on' || light === '1' || light === 'ON');
                }
                
                const relay = await fetchData(TOPICS.relay);
                if (relay !== null) {
                    currentState.relay = (relay === 'on' || relay === '1' || relay === 'ON');
                }
                
                const alarm = await fetchData(TOPICS.alarm);
                if (alarm !== null) {
                    currentState.alarm = (alarm === 'on' || alarm === '1' || alarm === 'ON');
                }
                
                updateUI();
                document.getElementById('statusText').textContent = '在线';
                document.getElementById('statusLed').className = 'led-green';
                
                if (currentState.temperature !== null && currentState.temperature > 30) {
                    addLog(`⚠️ 高温告警！当前温度: ${currentState.temperature.toFixed(1)}°C`);
                }
                
            } catch (error) {
                console.error('获取数据失败:', error);
                document.getElementById('statusText').textContent = '连接异常';
                document.getElementById('statusLed').className = 'led-red';
                addLog(`❌ 数据获取失败: ${error.message}`);
            }
        }

        // 控制设备
        async function controlDevice(topic, command) {
            try {
                addLog(`📤 发送指令: ${topic} -> ${command}`);
                const url = `${PROXY_URL}${API_BASE}${BEMFA_UID}/${topic}/${command}`;
                await fetch(url, { method: 'POST' });
                addLog(`✅ 指令已发送: ${topic} 已${command === 'on' ? '开启' : '关闭'}`);
                
                if (topic === TOPICS.light) {
                    currentState.light = (command === 'on');
                    updateUI();
                }
                if (topic === TOPICS.relay) {
                    currentState.relay = (command === 'on');
                    updateUI();
                }
                if (topic === TOPICS.alarm) {
                    currentState.alarm = (command === 'on');
                    updateUI();
                }
                
                setTimeout(() => fetchAllData(), 500);
                
            } catch (error) {
                addLog(`❌ 网络错误: ${error.message}`);
            }
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            addLog(`🌐 网页已加载，UID: ${BEMFA_UID}`);
            addLog(`📡 使用代理服务器获取数据，每2秒自动刷新`);
            fetchAllData();
            setInterval(fetchAllData, 2000);
        });
    </script>
</body>
</html>
