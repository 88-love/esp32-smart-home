<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>智能家居控制面板 - 巴法云</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 10px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 { color: #667eea; margin-bottom: 15px; border-left: 4px solid #667eea; padding-left: 10px; }
        .sensor-value { font-size: 2.5em; font-weight: bold; text-align: center; margin: 20px 0; }
        .temp { color: #ff6b6b; }
        .humi { color: #4ecdc4; }
        button {
            width: 45%;
            padding: 12px;
            margin: 10px 2%;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-on { background: #51cf66; color: white; }
        .btn-off { background: #ff6b6b; color: white; }
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }
        .status-on { background: #51cf66; color: white; }
        .status-off { background: #868e96; color: white; }
        .pir-detected { background: #ff6b6b; color: white; text-align: center; padding: 10px; border-radius: 8px; }
        .pir-clear { background: #51cf66; color: white; text-align: center; padding: 10px; border-radius: 8px; }
        .update-time { text-align: center; color: white; margin-top: 20px; font-size: 12px; }
        .config-bar {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .config-bar input {
            flex: 2;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .config-bar button {
            width: auto;
            margin: 0;
            padding: 10px 20px;
        }
        .note {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 智能家居控制系统</h1>
        <div class="subtitle">基于巴法云物联网平台</div>
        
        <div class="config-bar">
            <input type="text" id="uid" placeholder="巴法云UID" value="2426cc5615e7463ba3d4ec3640ef2c49" style="flex:3;">
            <button onclick="saveConfig()" style="background:#667eea;">保存配置</button>
        </div>

        <div class="grid">
            <div class="card">
                <h2>🌡️ 温度</h2>
                <div class="sensor-value temp"><span id="temp">--</span> °C</div>
            </div>
            <div class="card">
                <h2>💧 湿度</h2>
                <div class="sensor-value humi"><span id="humi">--</span> %</div>
            </div>
            <div class="card">
                <h2>🚶 人体感应</h2>
                <div id="pirDisplay" class="pir-clear">✅ 无人</div>
            </div>
            <div class="card">
                <h2>💡 LED 灯</h2>
                <button class="btn-on" onclick="sendCommand('light002', 'on')">🔘 开灯</button>
                <button class="btn-off" onclick="sendCommand('light002', 'off')">⚫ 关灯</button>
                <div id="ledStatus" class="status status-off">已关闭</div>
            </div>
            <div class="card">
                <h2>⚡ 继电器</h2>
                <button class="btn-on" onclick="sendCommand('switch002', 'on')">🔌 打开</button>
                <button class="btn-off" onclick="sendCommand('switch002', 'off')">🔴 关闭</button>
                <div id="relayStatus" class="status status-off">已关闭</div>
            </div>
            <div class="card">
                <h2>🔔 蜂鸣器</h2>
                <button class="btn-on" onclick="sendCommand('alarm002', 'on')">🔊 响铃</button>
                <button class="btn-off" onclick="sendCommand('alarm002', 'off')">🔇 静音</button>
                <div id="buzzerStatus" class="status status-off">已关闭</div>
            </div>
        </div>
        <div class="update-time">📡 最后更新: <span id="updateTime">--</span> | 自动刷新中</div>
    </div>

    <script>
        let UID = localStorage.getItem('bemfa_uid') || '2426cc5615e7463ba3d4ec3640ef2c49';
        document.getElementById('uid').value = UID;

        function saveConfig() {
            UID = document.getElementById('uid').value.trim();
            if (UID) {
                localStorage.setItem('bemfa_uid', UID);
                alert('配置已保存');
            }
        }

        // 获取数据
        async function fetchData() {
            if (!UID) return;
            
            const tempUrl = `https://api.bemfa.com/api/device/v1/data/1/${UID}/temp004/`;
            const humiUrl = `https://api.bemfa.com/api/device/v1/data/1/${UID}/humi004/`;
            const pirUrl = `https://api.bemfa.com/api/device/v1/data/1/${UID}/pir004/`;
            
            try {
                const [tempRes, humiRes, pirRes] = await Promise.all([
                    fetch(tempUrl), fetch(humiUrl), fetch(pirUrl)
                ]);
                const temp = await tempRes.text();
                const humi = await humiRes.text();
                const pir = await pirRes.text();
                
                if (temp && !isNaN(temp)) {
                    document.getElementById('temp').innerHTML = parseFloat(temp).toFixed(1);
                }
                if (humi && !isNaN(humi)) {
                    document.getElementById('humi').innerHTML = parseFloat(humi).toFixed(1);
                }
                if (pir !== undefined) {
                    const pirDiv = document.getElementById('pirDisplay');
                    if (pir == '1') {
                        pirDiv.innerHTML = '⚠️ 检测到有人！';
                        pirDiv.className = 'pir-detected';
                    } else {
                        pirDiv.innerHTML = '✅ 无人';
                        pirDiv.className = 'pir-clear';
                    }
                }
                document.getElementById('updateTime').innerHTML = new Date().toLocaleString();
            } catch (error) {
                console.error('获取数据失败:', error);
            }
        }

        // 发送命令
        async function sendCommand(topic, msg) {
            if (!UID) {
                alert('请先配置UID');
                return;
            }
            
            const url = `https://api.bemfa.com/api/device/v1/data/1/${UID}/${topic}/`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: msg
                });
                const result = await response.text();
                if (result === 'ok') {
                    console.log(`命令发送成功: ${topic}=${msg}`);
                    // 更新对应的状态显示
                    if (topic === 'light002') {
                        const ledDiv = document.getElementById('ledStatus');
                        ledDiv.innerHTML = msg === 'on' ? '🟢 已开启' : '🔴 已关闭';
                        ledDiv.className = msg === 'on' ? 'status status-on' : 'status status-off';
                    } else if (topic === 'switch002') {
                        const relayDiv = document.getElementById('relayStatus');
                        relayDiv.innerHTML = msg === 'on' ? '🟢 已开启' : '🔴 已关闭';
                        relayDiv.className = msg === 'on' ? 'status status-on' : 'status status-off';
                    } else if (topic === 'alarm002') {
                        const buzzerDiv = document.getElementById('buzzerStatus');
                        buzzerDiv.innerHTML = msg === 'on' ? '🔔 响铃中' : '🔕 已关闭';
                        buzzerDiv.className = msg === 'on' ? 'status status-on' : 'status status-off';
                    }
                    // 刷新一下数据
                    setTimeout(fetchData, 500);
                } else {
                    alert('控制失败');
                }
            } catch (error) {
                console.error('发送失败:', error);
                alert('网络错误，请重试');
            }
        }

        // 启动定时刷新
        fetchData();
        setInterval(fetchData, 3000);
    </script>
</body>
</html>
