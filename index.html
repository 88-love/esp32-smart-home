<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能家居控制</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    .state-card { background: #f5f7fa; border-radius: 8px; padding: 15px; margin: 10px 0; text-align: center; }
    .btn-group { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
    button { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 6px; color: white; font-size: 16px; }
    .on-btn { background: #00c851; }
    .off-btn { background: #ff3b30; }
  </style>
</head>
<body>
  <h1 style="text-align: center;">智能家居控制</h1>

  <div class="state-card">
    <p>温度: <span id="temp">--</span>℃</p>
    <p>湿度: <span id="humi">--</span>%</p>
  </div>

  <div class="btn-group">
    <button class="on-btn" onclick="sendCmd('light002','on')">开灯</button>
    <button class="off-btn" onclick="sendCmd('light002','off')">关灯</button>
  </div>
  <div class="btn-group">
    <button class="on-btn" onclick="sendCmd('switch002','on')">开继电器</button>
    <button class="off-btn" onclick="sendCmd('switch002','off')">关继电器</button>
  </div>
  <div class="btn-group">
    <button class="on-btn" onclick="sendCmd('alarm002','on')">开蜂鸣</button>
    <button class="off-btn" onclick="sendCmd('alarm002','off')">关蜂鸣</button>
  </div>

  <script>
    const uid = "2426cc5615e7463ba3d4ec3640ef2c49";
    const apiBase = "https://bemfa.com/api/v1";

    // 发送控制指令
    function sendCmd(topic, cmd) {
      fetch(`${apiBase}/send?uid=${uid}&topic=${topic}&msg=${cmd}`)
        .then(res => res.text())
        .then(data => alert("指令已发送：" + data));
    }

    // 定时刷新温湿度
    function refreshState() {
      fetch(`${apiBase}/get?uid=${uid}&topic=temp002`)
        .then(res => res.text())
        .then(data => document.getElementById("temp").innerText = data);
      fetch(`${apiBase}/get?uid=${uid}&topic=humi002`)
        .then(res => res.text())
        .then(data => document.getElementById("humi").innerText = data);
    }

    refreshState();
    setInterval(refreshState, 3000);
  </script>
</body>
</html>
