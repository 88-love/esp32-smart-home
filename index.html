<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 智能家居控制系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background-color: #f5f7fa;
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .header {
            background-color: #1677ff;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .section {
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .section h3 {
            margin-bottom: 15px;
            color: #333;
            border-left: 4px solid #1677ff;
            padding-left: 8px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .item:last-child {
            border-bottom: none;
        }
        .item .label {
            display: flex;
            flex-direction: column;
        }
        .item .label span:first-child {
            font-weight: bold;
            color: #333;
        }
        .item .label span:last-child {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .status {
            font-weight: bold;
            color: #999;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-on {
            background-color: #00c851;
        }
        .btn-off {
            background-color: #ff3b30;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏠 智能家居控制系统</h1>
        <p id="conn-status">正在连接巴法云...</p>
    </div>

    <div class="section">
        <h3>📊 实时数据</h3>
        <div class="item">
            <div class="label">
                <span>🌡️ 温度</span>
                <span>当前环境温度</span>
            </div>
            <div id="temp" class="status">---.°C</div>
        </div>
        <div class="item">
            <div class="label">
                <span>💧 湿度</span>
                <span>当前环境湿度</span>
            </div>
            <div id="humi" class="status">---.%</div>
        </div>
        <div class="item">
            <div class="label">
                <span>🚶 人体感应</span>
                <span>检测是否有人移动</span>
            </div>
            <div id="pir" class="status">未知</div>
        </div>
    </div>

    <div class="section">
        <h3>⚡ 设备控制</h3>
        <div class="item">
            <div class="label">
                <span>💡 LED灯</span>
                <span>控制板载LED或外接灯</span>
            </div>
            <div class="btn-group">
                <button class="btn-on" onclick="sendCmd('light002','on')">开</button>
                <button class="btn-off" onclick="sendCmd('light002','off')">关</button>
            </div>
        </div>
        <div class="item">
            <div class="label">
                <span>🔌 继电器</span>
                <span>控制大功率电器开关</span>
            </div>
            <div class="btn-group">
                <button class="btn-on" onclick="sendCmd('switch002','on')">开</button>
                <button class="btn-off" onclick="sendCmd('switch002','off')">关</button>
            </div>
        </div>
        <div class="item">
            <div class="label">
                <span>🔔 蜂鸣器</span>
                <span>控制报警或提示音</span>
            </div>
            <div class="btn-group">
                <button class="btn-on" onclick="sendCmd('alarm002','on')">开</button>
                <button class="btn-off" onclick="sendCmd('alarm002','off')">关</button>
            </div>
        </div>
    </div>

<script>

    <script>
        const BEMFA_UID = "2426cc5615e7463ba3d4ec3640ef2c49";
        const clientId = "web_" + Math.random().toString(36).substr(2, 10);
        const host = "bemfa.com";
        const port = 9504;
        const client = new Paho.MQTT.Client(host, port, clientId);

        function updateConnStatus(isOnline) {
            const el = document.getElementById("conn-status");
            if (isOnline) {
                el.innerText = "已连接巴法云";
                el.style.color = "#00c851";
            } else {
                el.innerText = "连接异常";
                el.style.color = "#ff3b30";
            }
        }

        client.onMessageArrived = function (msg) {
            const topic = msg.destinationName;
            const payload = msg.payloadString;
            if (topic === BEMFA_UID + "/temp004") {
                document.getElementById("temp").innerText = payload + "°C";
                document.getElementById("temp").style.color = "#1677ff";
            }
            if (topic === BEMFA_UID + "/humi004") {
                document.getElementById("humi").innerText = payload + "%";
                document.getElementById("humi").style.color = "#1677ff";
            }
            if (topic === BEMFA_UID + "/pir004") {
                document.getElementById("pir").innerText = payload === "1" ? "有人" : "无人";
                document.getElementById("pir").style.color = "#1677ff";
            }
        };

        client.onConnectionLost = function () {
            updateConnStatus(false);
            setTimeout(()=>{client.connect({onSuccess:onConnSuccess,onFailure:onConnFail})},3000);
        };

        function onConnSuccess() {
            updateConnStatus(true);
            client.subscribe(BEMFA_UID + "/#");
        }
        function onConnFail() {
            updateConnStatus(false);
        }

        client.connect({
            onSuccess: onConnSuccess,
            onFailure: onConnFail
        });

        function sendCmd(topic, msg) {
            if (!client.isConnected()) {
                alert("未连接巴法云");
                return;
            }
            var m = new Paho.MQTT.Message(msg);
            m.destinationName = BEMFA_UID + "/" + topic;
            client.send(m);
            alert("指令已发送");
        }
    </script>
</body>
</html>
