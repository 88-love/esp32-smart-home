<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ESP32 智能家居控制系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        /* 头部卡片 */
        .header {
            background: white;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .header .status {
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .status.online {
            background: #d4edda;
            color: #155724;
        }

        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }

        /* 传感器卡片 - 水平滑动 */
        .sensor-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .sensor-title {
            font-size: 16px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sensor-grid {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            scroll-snap-type: x mandatory;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .sensor-grid::-webkit-scrollbar {
            height: 4px;
        }

        .sensor-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .sensor-grid::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .sensor-item {
            flex: 0 0 110px;
            scroll-snap-align: start;
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .sensor-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .sensor-unit {
            font-size: 12px;
            color: #999;
        }

        .sensor-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        /* 控制卡片 - 水平滑动 */
        .control-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .control-title {
            font-size: 16px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-buttons {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            scroll-snap-type: x mandatory;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .control-buttons::-webkit-scrollbar {
            height: 4px;
        }

        .control-buttons::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .control-buttons::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .btn {
            flex: 0 0 110px;
            scroll-snap-align: start;
            padding: 12px 0;
            border: none;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-on {
            background: #28a745;
            color: white;
        }

        .btn-on:active {
            background: #218838;
            transform: scale(0.97);
        }

        .btn-off {
            background: #dc3545;
            color: white;
        }

        .btn-off:active {
            background: #c82333;
            transform: scale(0.97);
        }

        .btn-refresh {
            background: #17a2b8;
            color: white;
            flex: 1;
            min-width: 100%;
        }

        .btn-refresh:active {
            background: #138496;
            transform: scale(0.98);
        }

        /* 日志卡片 */
        .log-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .log-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .log-content {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            height: 120px;
            overflow-y: auto;
            font-size: 11px;
            font-family: monospace;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #e9ecef;
            color: #555;
            word-break: break-all;
        }

        /* 全宽按钮容器 */
        .full-width {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🏠 ESP32 智能家居</h1>
            <div id="connectionStatus" class="status online">🟢 在线 - 已连接</div>
        </div>

        <!-- 传感器数据 - 水平滑动 -->
        <div class="sensor-card">
            <div class="sensor-title">
                📊 环境监测 <span style="font-size:11px; color:#999;">← 左右滑动 →</span>
            </div>
            <div class="sensor-grid" id="sensorGrid">
                <div class="sensor-item">
                    <div class="sensor-value" id="temp">--</div>
                    <div class="sensor-unit">°C</div>
                    <div class="sensor-label">温度</div>
                </div>
                <div class="sensor-item">
                    <div class="sensor-value" id="humi">--</div>
                    <div class="sensor-unit">%</div>
                    <div class="sensor-label">湿度</div>
                </div>
                <div class="sensor-item">
                    <div class="sensor-value" id="pir">--</div>
                    <div class="sensor-unit"></div>
                    <div class="sensor-label">人体感应</div>
                </div>
            </div>
        </div>

        <!-- 设备控制 - 水平滑动 -->
        <div class="control-card">
            <div class="control-title">
                💡 LED 控制 <span style="font-size:11px; color:#999;">← 左右滑动 →</span>
            </div>
            <div class="control-buttons">
                <button class="btn btn-on" onclick="controlDevice('led', 'on')">🔛 开启</button>
                <button class="btn btn-off" onclick="controlDevice('led', 'off')">🔘 关闭</button>
            </div>
        </div>

        <div class="control-card">
            <div class="control-title">
                ⚡ 继电器控制 <span style="font-size:11px; color:#999;">← 左右滑动 →</span>
            </div>
            <div class="control-buttons">
                <button class="btn btn-on" onclick="controlDevice('relay', 'on')">🔌 开启</button>
                <button class="btn btn-off" onclick="controlDevice('relay', 'off')">🔌 关闭</button>
            </div>
        </div>

        <div class="control-card">
            <div class="control-title">
                🔔 蜂鸣器控制 <span style="font-size:11px; color:#999;">← 左右滑动 →</span>
            </div>
            <div class="control-buttons">
                <button class="btn btn-on" onclick="controlDevice('alarm', 'on')">🔊 开启</button>
                <button class="btn btn-off" onclick="controlDevice('alarm', 'off')">🔇 关闭</button>
            </div>
        </div>

        <!-- 手动刷新按钮 -->
        <div class="control-card">
            <button class="btn btn-refresh" onclick="refreshData()">
                🔄 手动刷新数据
            </button>
        </div>

        <!-- 操作日志 -->
        <div class="log-card">
            <div class="log-title">📋 操作日志</div>
            <div class="log-content" id="logContent">
                <div class="log-entry">系统初始化完成，等待数据...</div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 巴法云配置 ====================
        // ⚠️ 请确认这个UID与你的ESP32代码中的bemfa_uid一致
        const BEMFA_UID = "2426cc5615e7463ba3d4ec3640ef2c49";
        
        // 设备主题
        const TOPICS = {
            light: "light002",
            relay: "switch002", 
            alarm: "alarm002",
            temp: "temp002",
            humi: "humi002",
            pir: "pir002"
        };

        // WebSocket 连接
        let ws = null;
        let isConnected = false;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 10;

        // 当前设备状态
        let currentStates = {
            led: false,
            relay: false,
            alarm: false,
            temp: "--",
            humi: "--",
            pir: "--"
        };

        // ==================== 添加日志 ====================
        function addLog(message, isError = false) {
            const logDiv = document.getElementById('logContent');
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.style.color = isError ? '#dc3545' : '#28a745';
            logEntry.innerHTML = `[${time}] ${message}`;
            logDiv.appendChild(logEntry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            // 保留最近50条日志
            while (logDiv.children.length > 50) {
                logDiv.removeChild(logDiv.firstChild);
            }
        }

        // ==================== 更新UI显示 ====================
        function updateUI() {
            const tempElem = document.getElementById('temp');
            if (tempElem) tempElem.textContent = currentStates.temp;
            
            const humiElem = document.getElementById('humi');
            if (humiElem) humiElem.textContent = currentStates.humi;
            
            const pirElem = document.getElementById('pir');
            if (pirElem) {
                let pirState = currentStates.pir;
                if (pirState === 1 || pirState === "1" || pirState === "true" || pirState === "有人") {
                    pirElem.innerHTML = '👤 有人';
                    pirElem.style.color = '#dc3545';
                } else {
                    pirElem.innerHTML = '👻 无人';
                    pirElem.style.color = '#28a745';
                }
            }
        }

        // ==================== 发送控制指令（HTTP API + WebSocket双保险） ====================
        async function controlDevice(device, action) {
            const command = action === 'on' ? 'on' : 'off';
            const topicMap = {
                'led': TOPICS.light,
                'relay': TOPICS.relay,
                'alarm': TOPICS.alarm
            };
            const topic = topicMap[device];
            if (!topic) {
                addLog(`❌ 未知设备: ${device}`, true);
                return;
            }
            
            addLog(`📤 发送指令: ${device} -> ${command}`);
            
            // 方法1: HTTP API 发送（备选方案，更稳定）
            const apiUrl = `https://api.bemfa.com/api/device/v1/data/1/${BEMFA_UID}/${topic}/${command}/`;
            
            try {
                // 使用 fetch 发送请求
                const response = await fetch(apiUrl, { 
                    mode: 'no-cors'
                });
                addLog(`✅ HTTP指令已发送: ${device} ${command === 'on' ? '开启' : '关闭'}`);
            } catch (error) {
                // no-cors模式下，即使成功也会报错，所以这里不显示错误
                addLog(`📡 指令已发出 (等待ESP32响应)`, false);
            }
            
            // 方法2: 同时尝试通过 WebSocket 发送（如果连接存在）
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(command);
                addLog(`📡 WebSocket指令已发送`);
            }
        }

        // ==================== 手动刷新数据 ====================
        function refreshData() {
            addLog('🔄 手动刷新数据...');
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('get_status');
            } else {
                addLog('⚠️ WebSocket未连接，无法刷新，请稍后重试', true);
            }
        }

        // ==================== 连接巴法云WebSocket ====================
        function connectBemfaWebSocket() {
            if (!BEMFA_UID || BEMFA_UID === "你的巴法云UID") {
                addLog('⚠️ 请先在代码中配置巴法云UID', true);
                document.getElementById('connectionStatus').innerHTML = '🔴 未配置 - 请配置UID';
                document.getElementById('connectionStatus').className = 'status offline';
                return;
            }
            
            // 使用加密端口 8081
            const wsUrl = `wss://bemfa.com:8081/ws/${BEMFA_UID}/`;
            
            addLog(`🔌 正在连接巴法云...`);
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    addLog('✅ WebSocket 连接成功');
                    isConnected = true;
                    reconnectAttempts = 0;
                    document.getElementById('connectionStatus').innerHTML = '🟢 在线 - 已连接';
                    document.getElementById('connectionStatus').className = 'status online';
                    
                    // 订阅所有需要的主题
                    setTimeout(() => {
                        subscribeToTopics();
                    }, 500);
                };
                
                ws.onmessage = function(event) {
                    try {
                        let data = event.data;
                        addLog(`📩 收到数据: ${data.substring(0, 80)}`);
                        
                        // 解析巴法云返回的数据格式: topic#value
                        for (let [key, topic] of Object.entries(TOPICS)) {
                            if (data.startsWith(topic + '#')) {
                                const value = data.substring(topic.length + 1);
                                
                                switch(key) {
                                    case 'temp':
                                        currentStates.temp = parseFloat(value).toFixed(1);
                                        break;
                                    case 'humi':
                                        currentStates.humi = parseFloat(value).toFixed(1);
                                        break;
                                    case 'pir':
                                        currentStates.pir = value;
                                        break;
                                    case 'light':
                                        currentStates.led = (value === 'on' || value === '1');
                                        addLog(`💡 LED状态: ${currentStates.led ? '开启' : '关闭'}`);
                                        break;
                                    case 'relay':
                                        currentStates.relay = (value === 'on' || value === '1');
                                        addLog(`⚡ 继电器状态: ${currentStates.relay ? '开启' : '关闭'}`);
                                        break;
                                    case 'alarm':
                                        currentStates.alarm = (value === 'on' || value === '1');
                                        addLog(`🔔 蜂鸣器状态: ${currentStates.alarm ? '开启' : '关闭'}`);
                                        break;
                                }
                                updateUI();
                                break;
                            }
                        }
                    } catch (e) {
                        console.error('解析数据错误:', e);
                    }
                };
                
                ws.onerror = function(error) {
                    addLog(`⚠️ WebSocket 连接异常（可能是跨域限制）`, true);
                    console.error('WebSocket error:', error);
                    // 不标记为断开，因为HTTP API仍然可用
                };
                
                ws.onclose = function() {
                    addLog('🔌 WebSocket 连接断开', true);
                    isConnected = false;
                    document.getElementById('connectionStatus').innerHTML = '🟡 使用HTTP模式 - 控制可用';
                    document.getElementById('connectionStatus').className = 'status offline';
                    
                    // 自动重连
                    if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        reconnectAttempts++;
                        const delay = Math.min(5000 * reconnectAttempts, 30000);
                        addLog(`🔄 ${delay/1000}秒后尝试重连 (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`);
                        setTimeout(connectBemfaWebSocket, delay);
                    } else {
                        addLog('💡 WebSocket重连失败，但HTTP控制功能仍可使用', true);
                        document.getElementById('connectionStatus').innerHTML = '🟠 HTTP模式 - 控制可用';
                    }
                };
                
            } catch (error) {
                addLog(`❌ 连接失败: ${error.message}`, true);
            }
        }
        
        // ==================== 订阅主题 ====================
        function subscribeToTopics() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('⚠️ WebSocket未连接，无法订阅（不影响HTTP控制）', true);
                return;
            }
            
            addLog('📡 订阅设备主题...');
            const topicsToSubscribe = [TOPICS.light, TOPICS.relay, TOPICS.alarm, 
                                       TOPICS.temp, TOPICS.humi, TOPICS.pir];
            
            topicsToSubscribe.forEach(topic => {
                const subscribeMsg = `sub#${topic}`;
                ws.send(subscribeMsg);
            });
            addLog(`✅ 已订阅 ${topicsToSubscribe.length} 个主题`);
        }

        // ==================== 初始化页面 ====================
        function init() {
            addLog('🚀 ESP32 智能家居控制系统启动');
            addLog(`✅ 巴法云UID: ${BEMFA_UID.substring(0, 8)}...`);
            
            // 连接WebSocket
            connectBemfaWebSocket();
            
            // 定期检查连接状态
            setInterval(() => {
                if (ws && ws.readyState !== WebSocket.OPEN && !isConnected) {
                    // 静默处理，不频繁打印日志
                }
            }, 30000);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
        
        // 页面关闭时关闭WebSocket
        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
