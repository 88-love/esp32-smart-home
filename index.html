<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能家居控制系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background: linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        h1{color:white;text-align:center;margin-bottom:20px}
        .status{background:white;padding:15px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
        .dot{width:12px;height:12px;border-radius:50%}
        .green{background:#4cd964}
        .yellow{background:#ffcc00}
        .sensor{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px}
        .card{background:white;padding:20px;border-radius:12px;text-align:center}
        .value{font-size:32px;font-weight:bold;margin:10px 0;color:#667eea}
        .control{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
        button{padding:12px 20px;border:none;border-radius:30px;margin:5px;font-size:16px;cursor:pointer}
        .on{background:#4cd964;color:white}
        .off{background:#ff3b30;color:white}
        .log{background:white;padding:15px;border-radius:12px;height:200px;overflow-y:auto;margin-top:20px}
    </style>
</head>
<body>
<div class="container">
    <h1>🏠 智能家居控制平台</h1>
    <div class="status">
        <div id="connDot" class="dot yellow"></div>
        <span id="connText">连接巴法云...</span>
    </div>

    <div class="sensor">
        <div class="card">🌡️ 温度<br><div class="value" id="temp">--</div>℃</div>
        <div class="card">💧 湿度<br><div class="value" id="humi">--</div>%</div>
        <div class="card">🚶 人体<br><div class="value" id="pir">--</div></div>
    </div>

    <div class="control">
        <div class="card">💡 LED<br>
            <button class="on" onclick="send('light002','on')">开灯</button>
            <button class="off" onclick="send('light002','off')">关灯</button>
        </div>
        <div class="card">⚡ 继电器<br>
            <button class="on" onclick="send('switch002','on')">开启</button>
            <button class="off" onclick="send('switch002','off')">关闭</button>
        </div>
        <div class="card">🔊 蜂鸣器<br>
            <button class="on" onclick="send('alarm002','on')">鸣响</button>
            <button class="off" onclick="send('alarm002','off')">停止</button>
        </div>
    </div>

    <div class="log" id="log"></div>
</div>

<script>
    // 自动从你的ESP32代码获取
    const UID = "2426cc5615e7463ba3d4ec3640ef2c49";
    const topics = ["temp002","humi002","pir002","light002","switch002","alarm002"];
    let ws;

    function log(m){
        let d = new Date().toLocaleTimeString();
        let el = document.createElement("div");
        el.innerText = `[${d}] ${m}`;
        document.getElementById("log").prepend(el);
    }

    function send(dev, cmd){
        if(ws && ws.readyState === 1){
            ws.send(`${dev}#${cmd}`);
            log("发送：" + dev + " " + cmd);
        }else{
            log("未连接");
        }
    }

    function connect(){
        ws = new WebSocket(`wss://bemfa.com:9501/ws/${UID}/`);
        
        ws.onopen = function(){
            document.getElementById("connDot").className = "dot green";
            document.getElementById("connText").innerText = "已连接巴法云";
            log("巴法云连接成功 ✅");
            topics.forEach(t => ws.send(`sub#${t}`));
        };
        
        ws.onmessage = function(e){
            let data = e.data.trim();
            if(!data.includes("#")) return;
            let [topic, val] = data.split("#");
            
            if(topic === "temp002") document.getElementById("temp").innerText = val;
            if(topic === "humi002") document.getElementById("humi").innerText = val;
            if(topic === "pir002") document.getElementById("pir").innerText = val=="1"?"有人":"无人";
            log("数据：" + topic + " = " + val);
        };
        
        ws.onclose = function(){
            document.getElementById("connDot").className = "dot yellow";
            document.getElementById("connText").innerText = "重连中...";
            log("断开，5秒后重连...");
            setTimeout(connect, 5000);
        };
    }

    connect();
</script>
</body>
</html>
